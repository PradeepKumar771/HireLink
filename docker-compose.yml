version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - TNP_CORE_SERVICE_URL=http://tnp-core-service:5002
      - MATCHING_SERVICE_URL=http://matching-service:5003
      - JWT_SECRET=super-secret-key-hirelink
    depends_on:
      - auth-service
      - tnp-core-service
      - matching-service

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=super-secret-key-hirelink

  tnp-core-service:
    build:
      context: ./services/tnp-core-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - DATABASE_URL=file:./dev.db
      - MATCHING_SERVICE_URL=http://matching-service:5003
    depends_on:
      - matching-service

  matching-service:
    build:
      context: ./services/matching-service
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - TNP_CORE_SERVICE_URL=http://tnp-core-service:5002

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
