services:
  # Frontend Static Site
  - type: web
    name: hirelink-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000

  # API Gateway Web Service
  - type: web
    name: hirelink-api-gateway
    runtime: node
    rootDir: api-gateway
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: AUTH_SERVICE_URL
        value: https://hirelink-auth-service.onrender.com
      - key: TNP_CORE_SERVICE_URL
        value: https://hirelink-tnp-core-service.onrender.com
      - key: MATCHING_SERVICE_URL
        value: https://hirelink-matching-service.onrender.com
      - key: JWT_SECRET
        sync: false

  # Auth Service
  - type: web
    name: hirelink-auth-service
    runtime: node
    rootDir: services/auth-service
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        fromDatabase:
          name: hirelink-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

  # TNP Core Service
  - type: web
    name: hirelink-tnp-core-service
    runtime: node
    rootDir: services/tnp-core-service
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5002
      - key: DATABASE_URL
        fromDatabase:
          name: hirelink-db
          property: connectionString
      - key: MATCHING_SERVICE_URL
        value: https://hirelink-matching-service.onrender.com

  # Matching & Analytics Service
  - type: web
    name: hirelink-matching-service
    runtime: node
    rootDir: services/matching-service
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5003
      - key: TNP_CORE_SERVICE_URL
        value: https://hirelink-tnp-core-service.onrender.com

databases:
  - name: hirelink-db
    plan: free
