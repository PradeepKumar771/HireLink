apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: hirelink/api-gateway:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service-srv:5001"
        - name: TNP_CORE_SERVICE_URL
          value: "http://tnp-core-srv:5002"
        - name: MATCHING_SERVICE_URL
          value: "http://matching-srv:5003"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-srv
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: hirelink/auth-service:latest
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        - name: DATABASE_URL
          value: "mysql://admin:password@mysql-db-srv:3306/authdb"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-srv
spec:
  ports:
  - port: 5001
    targetPort: 5001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tnp-core-service
  labels:
    app: tnp-core-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tnp-core-service
  template:
    metadata:
      labels:
        app: tnp-core-service
    spec:
      containers:
      - name: tnp-core-service
        image: hirelink/tnp-core-service:latest
        ports:
        - containerPort: 5002
        env:
        - name: PORT
          value: "5002"
        - name: DATABASE_URL
          value: "mysql://admin:password@mysql-db-srv:3306/tnpdb"
        - name: MATCHING_SERVICE_URL
          value: "http://matching-srv:5003"
---
apiVersion: v1
kind: Service
metadata:
  name: tnp-core-srv
spec:
  ports:
  - port: 5002
    targetPort: 5002
  selector:
    app: tnp-core-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-service
  labels:
    app: matching-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matching-service
  template:
    metadata:
      labels:
        app: matching-service
    spec:
      containers:
      - name: matching-service
        image: hirelink/matching-service:latest
        ports:
        - containerPort: 5003
        env:
        - name: PORT
          value: "5003"
        - name: MONGODB_URI
          value: "mongodb://mongo-db-srv:27017/matching"
        - name: TNP_CORE_SERVICE_URL
          value: "http://tnp-core-srv:5002"
---
apiVersion: v1
kind: Service
metadata:
  name: matching-srv
spec:
  ports:
  - port: 5003
    targetPort: 5003
  selector:
    app: matching-service
